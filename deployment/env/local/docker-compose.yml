networks:
    vue26b_net:
        driver: bridge

services:
    app:
        build:
            context: ./deployment/docker/php
            dockerfile: Dockerfile
        container_name: vue26b_app
        working_dir: /var/www/html
        volumes:
            - '.:/var/www/html'
        environment:
            - DB_HOST=${DB_HOST}
            - DB_PORT=${DB_PORT}
            - DB_DATABASE=${DB_DATABASE}
            - DB_USERNAME=${DB_USERNAME}
            - DB_PASSWORD=${DB_PASSWORD}
            - REDIS_HOST=${REDIS_HOST}
            - REDIS_PORT=${REDIS_PORT}
        networks:
            - vue26b_net

    web:
      image: 'nginx:alpine'
      container_name: vue26b_web
      ports:
        - '${APP_PORT:-9500}:80'
      volumes:
        - '.:/var/www/html'
        - './deployment/docker/nginx/conf.d:/etc/nginx/conf.d'
        - './deployment/docker/nginx/nginx.conf:/etc/nginx/nginx.conf'
      networks:
        - vue26b_net
