networks:
    vue26b_net:
        driver: bridge

services:
    app:
        build:
            context: ./deployment/docker/php
            dockerfile: Dockerfile
        container_name: vue26b_app
        working_dir: /var/www/html
        volumes:
            - '.:/var/www/html'
        environment:
            - DB_HOST=${DB_HOST}
            - DB_PORT=${DB_PORT}
            - DB_DATABASE=${DB_DATABASE}
            - DB_USERNAME=${DB_USERNAME}
            - DB_PASSWORD=${DB_PASSWORD}
            - REDIS_HOST=${REDIS_HOST}
            - REDIS_PORT=${REDIS_PORT}
        networks:
            - vue26b_net

    web:
      image: 'nginx:alpine'
      container_name: vue26b_web
      ports:
        - '${APP_PORT:-9500}:80'
      volumes:
        - '.:/var/www/html'
        - './deployment/docker/nginx/conf.d:/etc/nginx/conf.d'
        - './deployment/docker/nginx/nginx.conf:/etc/nginx/nginx.conf'
      networks:
        - vue26b_net

    postgres:
        image: 'postgres:18-alpine'
        container_name: vue26b_postgres
        ports:
            - '${DB_PORT:-5432}:5432'
        environment:
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - './storage/docker/postgres:/var/lib/postgresql'
        networks:
            - vue26b_net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
            retries: 3
            timeout: 5s

    redis:
        image: 'redis:7-alpine'
        container_name: vue26b_redis
        ports:
            - '${REDIS_PORT:-6379}:6379'
        volumes:
            - './storage/docker/redis:/data'
        networks:
            - vue26b_net
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s

    mailpit:
        image: 'axllent/mailpit:latest'
        container_name: vue26b_mailpit
        ports:
            - '${MAILPIT_SMTP_PORT:-1025}:1025'
            - '${MAILPIT_UI_PORT:-9525}:8025'
        environment:
            MP_MAX_MESSAGES: 5000
            MP_DATA_FILE: /data/mailpit.db
        volumes:
            - './storage/docker/mailpit:/data'
        networks:
            - vue26b_net

    minio:
        image: 'minio/minio:latest'
        container_name: vue26b_minio
        ports:
            - '${MINIO_API_PORT:-9510}:9000'
            - '${MINIO_CONSOLE_PORT:-9511}:9001'
        environment:
            MINIO_ROOT_USER: '${MINIO_ROOT_USER:-minioadmin}'
            MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD:-minioadmin123}'
        volumes:
            - './storage/docker/minio:/data'
        networks:
            - vue26b_net
        command: server /data --console-address ":9001"
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            retries: 3
            timeout: 5s

    reverb:
        build:
            context: ./deployment/docker/php
            dockerfile: Dockerfile
        container_name: vue26b_reverb
        working_dir: /var/www/html
        volumes:
            - '.:/var/www/html'
        ports:
            - '${REVERB_PORT:-8080}:8080'
        environment:
            - DB_HOST=${DB_HOST}
            - DB_PORT=${DB_PORT}
            - DB_DATABASE=${DB_DATABASE}
            - DB_USERNAME=${DB_USERNAME}
            - DB_PASSWORD=${DB_PASSWORD}
            - REDIS_HOST=${REDIS_HOST}
            - REDIS_PORT=${REDIS_PORT}
        networks:
            - vue26b_net
        command: ['php', 'artisan', 'reverb:start', '--host=0.0.0.0', '--port=8080']

